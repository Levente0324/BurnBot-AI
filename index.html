<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BurnBot AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              neon: {
                orange: "#FF4500",
                red: "#FF0000",
                purple: "#7C3AED",
                dark: "#050505",
                panel: "#121212",
              },
            },
            fontFamily: {
              sans: ["Space Grotesk", "sans-serif"],
              mono: ["JetBrains Mono", "monospace"],
            },
            animation: {
              "pulse-fast": "pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite",
              "pulse-slow": "pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite",
              flame: "flame 3s infinite ease-in-out",
              "fade-in": "fadeIn 0.3s ease-out forwards",
              "fade-in-up": "fadeInUp 0.5s ease-out forwards",
              "slide-in-right": "slideInRight 0.4s ease-out forwards",
              "slide-in-left": "slideInLeft 0.3s ease-out forwards",
              "scale-in": "scaleIn 0.3s ease-out forwards",
              "glow-pulse": "glowPulse 2s ease-in-out infinite",
              shimmer: "shimmer 1.5s infinite",
              float: "float 6s ease-in-out infinite",
            },
            keyframes: {
              flame: {
                "0%, 100%": { opacity: 1, transform: "scale(1)" },
                "50%": { opacity: 0.8, transform: "scale(1.05)" },
              },
              fadeIn: {
                "0%": { opacity: 0 },
                "100%": { opacity: 1 },
              },
              fadeInUp: {
                "0%": { opacity: 0, transform: "translateY(20px)" },
                "100%": { opacity: 1, transform: "translateY(0)" },
              },
              slideInRight: {
                "0%": { opacity: 0, transform: "translateX(30px)" },
                "100%": { opacity: 1, transform: "translateX(0)" },
              },
              slideInLeft: {
                "0%": { opacity: 0, transform: "translateX(-20px)" },
                "100%": { opacity: 1, transform: "translateX(0)" },
              },
              scaleIn: {
                "0%": { opacity: 0, transform: "scale(0.9)" },
                "100%": { opacity: 1, transform: "scale(1)" },
              },
              glowPulse: {
                "0%, 100%": { boxShadow: "0 0 5px rgba(124, 58, 237, 0.3)" },
                "50%": { boxShadow: "0 0 20px rgba(124, 58, 237, 0.6)" },
              },
              shimmer: {
                "0%": { backgroundPosition: "-200% 0" },
                "100%": { backgroundPosition: "200% 0" },
              },
              float: {
                "0%, 100%": { transform: "translateY(0)" },
                "50%": { transform: "translateY(-10px)" },
              },
            },
          },
        },
      };
    </script>
    <style>
      body {
        /* Force Dark Mode Default */
        background-color: #050505;
        color: #ffffff;
        margin: 0;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      .glass-panel {
        background: rgba(18, 18, 18, 0.6);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(124, 58, 237, 0.2);
      }

      .neon-glow {
        box-shadow: 0 0 10px rgba(124, 58, 237, 0.5);
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #050505;
      }
      ::-webkit-scrollbar-thumb {
        background: #333;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #7c3aed;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
